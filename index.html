<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tripad — Code Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #05070d;
    --surface: #080c14;
    --border:  #1a1f2e;
    --cell-bg: #0d111a;
    --text:    #cbd5e1;
    --muted:   #4b5563;
    --dim:     #1f2937;

    --html:  #f97316;
    --css:   #06b6d4;
    --combo: #a78bfa;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    flex-shrink: 0;
    gap: 0;
  }

  #logo {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--html), var(--combo));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-right: 8px;
    letter-spacing: -0.5px;
  }
  #logo-v {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-right: 24px;
    -webkit-text-fill-color: var(--dim);
  }

  .mode-tab {
    height: 100%;
    padding: 0 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }
  .mode-tab[data-mode="html"].active  { color: var(--html);  border-color: var(--html); }
  .mode-tab[data-mode="css"].active   { color: var(--css);   border-color: var(--css); }
  .mode-tab[data-mode="combo"].active { color: var(--combo); border-color: var(--combo); }

  #stats {
    margin-left: auto;
    display: flex;
    gap: 14px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
  }
  #stats span { transition: color 0.2s; }

  /* ── PANEL ── */
  #panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* panel header */
  #panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #panel-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #panel-count { font-size: 10px; color: var(--dim); }
  #panel-actions { margin-left: auto; display: flex; gap: 6px; }

  .sm-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    padding: 3px 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.15s, color 0.15s;
  }
  .sm-btn:hover { border-color: var(--muted); color: var(--text); }
  .sm-btn.add-btn {
    color: #000;
    font-weight: 700;
    border: none;
  }

  /* scrollable cell list */
  #cell-list {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #cell-list::-webkit-scrollbar { width: 4px; }
  #cell-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── CELL ── */
  .cell {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
    background: var(--cell-bg);
    box-shadow: 0 2px 20px #00000050;
    transition: box-shadow 0.2s;
  }
  .cell:hover { box-shadow: 0 4px 30px #00000080; }

  .cell-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .cell-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cell-title {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    outline: none;
    width: 90px;
  }
  .cell-index { color: var(--dim); font-size: 11px; margin-left: auto; }
  .cell-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    padding: 2px 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .cell-btn.danger { color: #ef4444; }
  .cell-btn:hover { border-color: var(--muted); }
  .cell-btn.danger:hover { border-color: #ef4444; }

  .cell-body { display: flex; height: 300px; }
  .cell-body.collapsed { display: none; }

  .editor-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .editor-tab {
    padding: 6px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .editor-tab.active { color: var(--text); }

  textarea.code {
    flex: 1;
    background: var(--cell-bg);
    color: var(--text);
    border: none;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  .preview-side {
    flex: 1;
    background: #fff;
  }
  .preview-side iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* add-cell button at bottom */
  .add-cell-bottom {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--dim);
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    margin-bottom: 14px;
    transition: all 0.2s;
  }
  .add-cell-bottom:hover { border-color: currentColor; }

  /* empty state */
  .empty {
    text-align: center;
    color: var(--dim);
    padding: 60px 0;
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span id="logo">tripad</span>
  <span id="logo-v">v2</span>

  <button class="mode-tab active" data-mode="html" onclick="switchMode('html')">HTML</button>
  <button class="mode-tab" data-mode="css"  onclick="switchMode('css')">CSS</button>
  <button class="mode-tab" data-mode="combo" onclick="switchMode('combo')">HTML + CSS</button>

  <div id="stats">
    <span id="stat-html"></span>
    <span id="stat-css"></span>
    <span id="stat-combo"></span>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div id="panel-header">
    <div id="panel-dot"></div>
    <span id="panel-label"></span>
    <span id="panel-count"></span>
    <div id="panel-actions">
      <button class="sm-btn" onclick="expandAll()">↕ all</button>
      <button class="sm-btn" onclick="collapseAll()">— all</button>
      <button class="sm-btn add-btn" id="add-btn" onclick="addCell()">+ add</button>
    </div>
  </div>
  <div id="cell-list"></div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let currentMode = 'html';
let uid = 100;
const nextId = () => uid++;

const ACCENT = { html: '#f97316', css: '#06b6d4', combo: '#a78bfa' };
const LABEL  = { html: 'HTML', css: 'CSS', combo: 'HTML + CSS' };

const state = {
  html: [
    {
      id: 1, title: 'Structure 01', collapsed: false,
      code: `<article class="card">
  <header>
    <span class="tag">Featured</span>
    <h2>HTML Structure</h2>
  </header>
  <p>HTML defines the <strong>structure</strong> and <em>meaning</em> of your content.</p>
  <footer><a href="#">Read more →</a></footer>
</article>`,
    },
    {
      id: 2, title: 'Structure 02', collapsed: false,
      code: `<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Work</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>`,
    },
  ],
  css: [
    {
      id: 3, title: 'Style 01', collapsed: false,
      code: `/* gradient text */
.gradient-text {
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, #f97316, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* glass card */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 24px;
}`,
    },
    {
      id: 4, title: 'Style 02', collapsed: false,
      code: `/* neon button */
.neon-btn {
  padding: 12px 28px;
  border: 2px solid #06b6d4;
  background: transparent;
  color: #06b6d4;
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-size: 12px;
  transition: all 0.3s;
}
.neon-btn:hover {
  background: #06b6d4;
  color: #000;
  box-shadow: 0 0 24px #06b6d4;
}`,
    },
  ],
  combo: [
    {
      id: 5, title: 'Combined 01', collapsed: false,
      html: `<div class="hero">
  <div class="glow"></div>
  <h1>Hello World</h1>
  <p>HTML + CSS together</p>
  <button onclick="this.textContent='🎉 Clicked!'">Launch</button>
</div>`,
      css: `* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: #08010f;
  font-family: 'Segoe UI', sans-serif;
}
.hero {
  position: relative; text-align: center;
  padding: 60px 48px; z-index: 1;
}
.glow {
  position: absolute; inset: 0; border-radius: 24px;
  background: radial-gradient(circle, #a78bfa22, transparent 70%);
  border: 1px solid #a78bfa33; z-index: -1;
}
h1 { font-size: 3rem; color: #a78bfa; margin-bottom: 12px; }
p  { color: #6b7280; margin-bottom: 32px; }
button {
  padding: 12px 32px; background: #a78bfa; color: #08010f;
  border: none; border-radius: 8px; cursor: pointer;
  font-weight: 700; font-size: 14px; transition: all 0.2s;
}
button:hover { transform: scale(1.05); box-shadow: 0 0 24px #a78bfa88; }`,
    },
    {
      id: 6, title: 'Combined 02', collapsed: false,
      html: `<div class="grid">
  <div class="box" style="--i:0">01</div>
  <div class="box" style="--i:1">02</div>
  <div class="box" style="--i:2">03</div>
  <div class="box" style="--i:3">04</div>
</div>`,
      css: `* { box-sizing: border-box; }
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; margin: 0; background: #05070d;
}
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.box {
  width: 100px; height: 100px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-weight: 700; font-size: 18px; color: white;
  background: linear-gradient(135deg, #a78bfa, #7c3aed);
  animation: pop 0.6s ease calc(var(--i) * 0.12s) both;
}
@keyframes pop {
  from { transform: scale(0) rotate(20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);  opacity: 1; }
}`,
    },
  ],
};

// ── BUILD SRCDOC ─────────────────────────────────────────────────────────────
function buildSrcdoc(mode, cell) {
  if (mode === 'html') {
    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>body{font-family:sans-serif;padding:20px;color:#222;line-height:1.6;}a{color:#3b82f6;}.tag{background:#f97316;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;}</style>
</head><body>${cell.code}</body></html>`;
  }
  if (mode === 'css') {
    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:100vh;margin:0;background:#0f0f0f;font-family:sans-serif;}
${cell.code}
</style></head><body>
<div class="gradient-text">Style Preview</div>
<div class="glass" style="color:#eee;font-size:14px;">Glass card</div>
<button class="neon-btn">Neon Button</button>
</body></html>`;
  }
  // combo
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>${cell.css || ''}</style>
</head><body>${cell.html || ''}</body></html>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const accent = ACCENT[currentMode];
  const cells  = state[currentMode];

  // update tabs
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === currentMode);
  });

  // panel header
  document.getElementById('panel-dot').style.cssText =
    `background:${accent};box-shadow:0 0 8px ${accent};width:8px;height:8px;border-radius:50%;`;
  document.getElementById('panel-label').style.color = accent;
  document.getElementById('panel-label').textContent = LABEL[currentMode];
  document.getElementById('panel-count').textContent =
    `${cells.length} cell${cells.length !== 1 ? 's' : ''}`;
  document.getElementById('add-btn').style.background = accent;

  // stats
  document.getElementById('stat-html').textContent  = state.html.length + ' html';
  document.getElementById('stat-html').style.color  = currentMode === 'html'  ? ACCENT.html  : '';
  document.getElementById('stat-css').textContent   = state.css.length  + ' css';
  document.getElementById('stat-css').style.color   = currentMode === 'css'   ? ACCENT.css   : '';
  document.getElementById('stat-combo').textContent = state.combo.length + ' combo';
  document.getElementById('stat-combo').style.color = currentMode === 'combo' ? ACCENT.combo : '';

  // cells
  const list = document.getElementById('cell-list');
  list.innerHTML = '';

  if (cells.length === 0) {
    list.innerHTML = '<div class="empty">no cells — add one ↑</div>';
  } else {
    cells.forEach((cell, i) => {
      list.appendChild(createCellEl(cell, i));
    });
  }

  // add-cell button
  const addBottom = document.createElement('button');
  addBottom.className = 'add-cell-bottom';
  addBottom.textContent = '+ new cell';
  addBottom.style.color = accent; // inherit hover
  addBottom.addEventListener('mouseenter', () => addBottom.style.borderColor = accent);
  addBottom.addEventListener('mouseleave', () => addBottom.style.borderColor = '');
  addBottom.onclick = addCell;
  list.appendChild(addBottom);
}

function createCellEl(cell, index) {
  const mode   = currentMode;
  const accent = ACCENT[mode];

  const wrapper = document.createElement('div');
  wrapper.className = 'cell';
  wrapper.dataset.id = cell.id;

  // ── header
  const header = document.createElement('div');
  header.className = 'cell-header';
  header.innerHTML = `
    <div class="cell-dot" style="background:${accent};box-shadow:0 0 6px ${accent}"></div>
    <input class="cell-title" value="${esc(cell.title)}" title="rename">
    <span class="cell-index">#${String(index + 1).padStart(2, '0')}</span>
    <button class="cell-btn toggle-btn">${cell.collapsed ? '▶ show' : '▼ hide'}</button>
    <button class="cell-btn dup-btn">⧉</button>
    <button class="cell-btn danger del-btn">✕</button>
  `;

  // title rename
  header.querySelector('.cell-title').addEventListener('input', e => {
    getCellById(cell.id).title = e.target.value;
    updateStats();
  });

  // toggle
  header.querySelector('.toggle-btn').addEventListener('click', () => {
    getCellById(cell.id).collapsed = !getCellById(cell.id).collapsed;
    render();
  });

  // duplicate
  header.querySelector('.dup-btn').addEventListener('click', () => {
    const src = getCellById(cell.id);
    const copy = JSON.parse(JSON.stringify(src));
    copy.id = nextId();
    copy.title = src.title + ' copy';
    const arr = state[mode];
    arr.splice(arr.indexOf(src) + 1, 0, copy);
    render();
  });

  // delete
  header.querySelector('.del-btn').addEventListener('click', () => {
    state[mode] = state[mode].filter(c => c.id !== cell.id);
    render();
  });

  wrapper.appendChild(header);

  // ── body
  const body = document.createElement('div');
  body.className = 'cell-body' + (cell.collapsed ? ' collapsed' : '');

  // editor side
  const editorSide = document.createElement('div');
  editorSide.className = 'editor-side';

  if (mode === 'combo') {
    // tab bar
    const tabBar = document.createElement('div');
    tabBar.className = 'tab-bar';
    tabBar.innerHTML = `
      <button class="editor-tab active" data-tab="html" style="border-color:${accent}">html</button>
      <button class="editor-tab" data-tab="css">css</button>
    `;
    editorSide.appendChild(tabBar);

    const textarea = document.createElement('textarea');
    textarea.className = 'code';
    textarea.value = cell.html || '';

    tabBar.querySelectorAll('.editor-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        tabBar.querySelectorAll('.editor-tab').forEach(b => {
          b.classList.remove('active');
          b.style.borderColor = '';
        });
        btn.classList.add('active');
        btn.style.borderColor = accent;
        const t = btn.dataset.tab;
        textarea.value = getCellById(cell.id)[t] || '';
        textarea.dataset.tab = t;
      });
    });

    textarea.dataset.tab = 'html';
    textarea.addEventListener('input', e => {
      getCellById(cell.id)[e.target.dataset.tab] = e.target.value;
      refreshPreview(cell.id);
    });
    textarea.addEventListener('keydown', tabKey);
    editorSide.appendChild(textarea);
  } else {
    const textarea = document.createElement('textarea');
    textarea.className = 'code';
    textarea.value = cell.code || '';
    textarea.addEventListener('input', e => {
      getCellById(cell.id).code = e.target.value;
      refreshPreview(cell.id);
    });
    textarea.addEventListener('keydown', tabKey);
    editorSide.appendChild(textarea);
  }

  // preview side
  const previewSide = document.createElement('div');
  previewSide.className = 'preview-side';
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts';
  iframe.dataset.cellId = cell.id;
  iframe.srcdoc = buildSrcdoc(mode, cell);
  previewSide.appendChild(iframe);

  body.appendChild(editorSide);
  body.appendChild(previewSide);
  wrapper.appendChild(body);

  return wrapper;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getCellById(id) {
  return state[currentMode].find(c => c.id === id);
}

function refreshPreview(cellId) {
  const cell = getCellById(cellId);
  const iframe = document.querySelector(`iframe[data-cell-id="${cellId}"]`);
  if (iframe && cell) iframe.srcdoc = buildSrcdoc(currentMode, cell);
}

function updateStats() {
  document.getElementById('stat-html').textContent  = state.html.length + ' html';
  document.getElementById('stat-css').textContent   = state.css.length  + ' css';
  document.getElementById('stat-combo').textContent = state.combo.length + ' combo';
  document.getElementById('panel-count').textContent =
    `${state[currentMode].length} cell${state[currentMode].length !== 1 ? 's' : ''}`;
}

function tabKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = e.target.selectionStart, en = e.target.selectionEnd;
    const v = e.target.value;
    e.target.value = v.substring(0, s) + '  ' + v.substring(en);
    e.target.selectionStart = e.target.selectionEnd = s + 2;
    e.target.dispatchEvent(new Event('input'));
  }
}

function esc(str) {
  return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  render();
}

function addCell() {
  const id = nextId();
  const accent = ACCENT[currentMode];
  const newCell = currentMode === 'combo'
    ? {
        id, title: `Cell ${id}`, collapsed: false,
        html: `<div class="box">\n  <h2>New Cell</h2>\n  <p>Edit me!</p>\n</div>`,
        css: `* { box-sizing: border-box; }\nbody {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n  margin: 0;\n  background: #111;\n  font-family: sans-serif;\n  color: #eee;\n}\n.box { text-align: center; }`,
      }
    : {
        id, title: `Cell ${id}`, collapsed: false,
        code: currentMode === 'css'
          ? `/* Your CSS here */\n.my-element {\n  color: red;\n}`
          : `<div class="my-element">\n  <h2>New Cell</h2>\n  <p>Edit me!</p>\n</div>`,
      };
  state[currentMode].push(newCell);
  render();
  // scroll to bottom
  setTimeout(() => {
    const list = document.getElementById('cell-list');
    list.scrollTop = list.scrollHeight;
  }, 50);
}

function collapseAll() {
  state[currentMode].forEach(c => c.collapsed = true);
  render();
}

function expandAll() {
  state[currentMode].forEach(c => c.collapsed = false);
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
